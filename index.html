<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Bola Loca v0.2</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#050816;font-family:Arial,Helvetica,sans-serif;touch-action:none;color:white}canvas{display:block;width:100vw;height:100vh;background:radial-gradient(circle at top,#1b2a5a 0%,#081023 45%,#02040b 100%)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener('resize',resize);resize();

let state='menu';
let score=0,coins=0,best=Number(localStorage.getItem('bola_best')||0);
let multiplier=1,multiplierTimer=0;
let t=0,spawnObs=0,spawnCoin=0,spawnMeteor=0,shake=0,flash=0;
let particles=[];
const player={x:W/2,y:H*0.78,r:24,vx:0,vy:0};
const obstacles=[], coinItems=[], meteors=[];

function reset(){
 state='play';score=0;coins=0;multiplier=1;multiplierTimer=0;t=0;spawnObs=0;spawnCoin=0;spawnMeteor=0;shake=0;flash=0;
 obstacles.length=0;coinItems.length=0;meteors.length=0;particles.length=0;
 player.x=W/2;player.y=H*0.78;player.vx=0;player.vy=0;
}
function rnd(a,b){return Math.random()*(b-a)+a}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}
function addParticles(x,y,color,n=24,power=4){for(let i=0;i<n;i++){particles.push({x,y,vx:rnd(-power,power),vy:rnd(-power,power),life:rnd(25,55),max:55,r:rnd(2,5),color})}}
function spawnObstacle(){obstacles.push({x:rnd(35,W-35),y:-50,w:rnd(55,120),h:rnd(18,35),vy:rnd(2.2,4.2)+t*0.002})}
function spawnCoinItem(){coinItems.push({x:rnd(30,W-30),y:-30,r:12,vy:rnd(2.5,4.3),rot:0})}
function randomMultiplier(){const values=[2,2,2,3,3,5,5,10];return values[Math.floor(Math.random()*values.length)]}
function spawnMeteor(){meteors.push({x:rnd(35,W-35),y:-40,r:rnd(18,24),vy:rnd(2.4,3.8),rot:rnd(0,6.28),spin:rnd(-0.04,0.04),mul:randomMultiplier()})}

function pointer(x,y){ if(state==='menu'||state==='over'){reset();return} player.x=x; player.y=y; }
canvas.addEventListener('pointerdown',e=>{e.preventDefault();pointer(e.clientX,e.clientY)});
canvas.addEventListener('pointermove',e=>{e.preventDefault();if(state==='play'){player.x=e.clientX;player.y=e.clientY}}, {passive:false});

function update(){
 t++;
 if(state!=='play') return;
 score += 0.08*multiplier;
 if(score>best){best=Math.floor(score);localStorage.setItem('bola_best',best)}
 if(multiplierTimer>0){multiplierTimer--; if(multiplierTimer<=0) multiplier=1;}
 spawnObs--;spawnCoin--;spawnMeteor--;
 if(spawnObs<=0){spawnObstacle();spawnObs=Math.max(24,70-t*0.01)}
 if(spawnCoin<=0){spawnCoinItem();spawnCoin=rnd(45,90)}
 if(spawnMeteor<=0){spawnMeteor();spawnMeteor=rnd(160,260)}
 for(const o of obstacles)o.y+=o.vy;
 for(const c of coinItems){c.y+=c.vy;c.rot+=0.08}
 for(const m of meteors){m.y+=m.vy;m.rot+=m.spin}
 for(let i=obstacles.length-1;i>=0;i--){const o=obstacles[i]; if(o.y>H+80)obstacles.splice(i,1); else if(player.x+player.r>o.x-o.w/2&&player.x-player.r<o.x+o.w/2&&player.y+player.r>o.y-o.h/2&&player.y-player.r<o.y+o.h/2){state='over';shake=14;addParticles(player.x,player.y,'#ff4d4d',45,7)}}
 for(let i=coinItems.length-1;i>=0;i--){const c=coinItems[i]; if(c.y>H+50)coinItems.splice(i,1); else if(dist(player.x,player.y,c.x,c.y)<player.r+c.r){coins++;score+=10*multiplier;addParticles(c.x,c.y,'#ffd84a',14,3);coinItems.splice(i,1)}}
 for(let i=meteors.length-1;i>=0;i--){const m=meteors[i]; if(m.y>H+60)meteors.splice(i,1); else if(dist(player.x,player.y,m.x,m.y)<player.r+m.r){multiplier=m.mul;multiplierTimer=420;score+=25*m.mul;flash=1;shake=8;addParticles(m.x,m.y,'#9cf6ff',55,8);addParticles(m.x,m.y,'#ffffff',28,10);meteors.splice(i,1)}}
 for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life--;if(p.life<=0)particles.splice(i,1)}
 if(shake>0)shake*=0.85; if(flash>0)flash-=0.035;
}

function drawMeteor(m){
 ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.rot);
 // cola luminosa
 const g=ctx.createLinearGradient(-45,-10,15,5);g.addColorStop(0,'rgba(255,120,30,0)');g.addColorStop(0.45,'rgba(255,118,35,0.55)');g.addColorStop(1,'rgba(255,235,120,0.9)');
 ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(-55,-16);ctx.lineTo(-8,-8);ctx.lineTo(-5,12);ctx.lineTo(-58,20);ctx.closePath();ctx.fill();
 // roca irregular
 ctx.fillStyle='#8b5a3c';ctx.strokeStyle='#ffb45c';ctx.lineWidth=2;
 ctx.beginPath();
 ctx.moveTo(-m.r*0.8,-m.r*0.35);ctx.lineTo(-m.r*0.25,-m.r*0.9);ctx.lineTo(m.r*0.65,-m.r*0.62);ctx.lineTo(m.r*0.9,0);ctx.lineTo(m.r*0.45,m.r*0.75);ctx.lineTo(-m.r*0.45,m.r*0.85);ctx.lineTo(-m.r*0.95,m.r*0.2);ctx.closePath();ctx.fill();ctx.stroke();
 ctx.fillStyle='#c47a47';ctx.beginPath();ctx.arc(-m.r*.2,-m.r*.15,4,0,Math.PI*2);ctx.arc(m.r*.35,m.r*.2,5,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='white';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('x?',0,1);
 ctx.restore();
}
function draw(){
 ctx.save();
 if(shake>0)ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
 ctx.clearRect(-20,-20,W+40,H+40);
 // fondo estrellas
 ctx.fillStyle='rgba(255,255,255,.45)'; for(let i=0;i<45;i++){let x=(i*73+t*.15)%W,y=(i*113)%H;ctx.fillRect(x,y,2,2)}
 // objetos
 for(const o of obstacles){ctx.fillStyle='#ef4444';ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h);ctx.strokeStyle='#fecaca';ctx.strokeRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)}
 for(const c of coinItems){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff7aa';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#8a5a00';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',0,1);ctx.restore()}
 for(const m of meteors)drawMeteor(m);
 // bola
 const bg=ctx.createRadialGradient(player.x-8,player.y-10,4,player.x,player.y,player.r);bg.addColorStop(0,'#dff9ff');bg.addColorStop(.35,'#38bdf8');bg.addColorStop(1,'#075985');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=3;ctx.stroke();
 for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
 ctx.restore();
 // flash
 if(flash>0){ctx.fillStyle=`rgba(255,255,255,${flash*.55})`;ctx.fillRect(0,0,W,H);ctx.strokeStyle=`rgba(130,230,255,${flash})`;ctx.lineWidth=8;ctx.beginPath();ctx.arc(player.x,player.y,80*(1.05-flash)+20,0,Math.PI*2);ctx.stroke();}
 // HUD
 ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,W,92);
 ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.textAlign='left';ctx.fillText('Puntos: '+Math.floor(score),16,28);ctx.fillText('Monedas: '+coins,16,56);ctx.fillText('Récord: '+best,16,82);
 ctx.textAlign='right';ctx.fillStyle=multiplier>1?'#67e8f9':'white';ctx.fillText('Multiplicador: x'+multiplier, W-16,28); if(multiplier>1){ctx.fillStyle='#d1fae5';ctx.fillText('Tiempo: '+Math.ceil(multiplierTimer/60)+'s',W-16,56)}
 if(state==='menu'){overlay('BOLA LOCA','JUGAR','Mueve la bola con el dedo. Coge meteoritos para multiplicadores aleatorios.');}
 if(state==='over'){overlay('GAME OVER','TOCA PARA REINICIAR','Puntos: '+Math.floor(score)+'  |  Monedas: '+coins);}
}
function overlay(title,button,sub){ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#67e8f9';ctx.font='bold 48px Arial';ctx.fillText(title,W/2,H*.34);ctx.fillStyle='white';ctx.font='20px Arial';ctx.fillText(sub,W/2,H*.43);ctx.fillStyle='#22c55e';roundRect(W/2-110,H*.52,220,66,18);ctx.fill();ctx.fillStyle='white';ctx.font='bold 27px Arial';ctx.fillText(button,W/2,H*.52+43)}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function loop(){update();draw();requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
