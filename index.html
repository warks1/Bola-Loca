<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crazy Ball Demo</title>
<style>
body{margin:0;background:linear-gradient(#102347,#050913);font-family:Arial;color:#fff;overflow:hidden}
.panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
background:rgba(0,0,0,.45);padding:24px;border-radius:18px;width:min(90vw,520px)}
button{display:block;width:100%;margin:8px 0;padding:14px;border:0;border-radius:12px;background:#2f7cff;color:#fff;font-size:18px}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%}
</style></head><body>
<div id="stars"></div>
<div class="panel">
<h1>Crazy Ball v10 Demo Concept</h1>
<p>Concepto del nuevo menú comercial.</p>
<button onclick="alert('Modo Historia en desarrollo')">▶ Jugar</button>
<button onclick="alert('Multijugador Online en desarrollo')">🌍 Multijugador</button>
<button onclick="alert('Sistema de Skins HD')">👕 Skins</button>
<button onclick="alert('Pase de temporada')">🎟 Pase de temporada</button>
<button onclick="alert('Misiones y Eventos')">🎯 Misiones</button>
</div>
<script>
const s=document.getElementById('stars');
for(let i=0;i<150;i++){
 let d=document.createElement('div');
 d.className='star';
 d.style.left=Math.random()*100+'vw';
 d.style.top=Math.random()*100+'vh';
 s.appendChild(d);
}
</script>
</body></html>
