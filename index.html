<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Bola Loca - Demo Jugable</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060716;font-family:Arial,Helvetica,sans-serif;color:white;touch-action:none;overscroll-behavior:none}
  #game{position:fixed;inset:0;width:100vw;height:100dvh;display:block;background:radial-gradient(circle at 50% 25%,#20235a 0%,#101338 42%,#050611 100%)}
  #ui{position:fixed;inset:0;pointer-events:none}
  .top{position:absolute;top:calc(14px + env(safe-area-inset-top));left:12px;right:12px;display:flex;gap:8px;align-items:flex-start;z-index:5}
  .box{background:rgba(10,12,32,.78);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:8px 10px;min-width:68px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .label{font-size:12px;color:#b9b6ff;font-weight:700}.num{font-size:24px;font-weight:900;line-height:1.05}
  .pause{margin-left:auto;width:58px;height:58px;border-radius:18px;border:0;background:linear-gradient(135deg,#22e7ff,#7c3cff);color:white;font-size:26px;font-weight:900;pointer-events:auto}
  .center{position:absolute;left:20px;right:20px;top:50%;transform:translateY(-50%);background:rgba(8,9,26,.86);border:1px solid rgba(255,255,255,.16);border-radius:28px;padding:28px 22px;text-align:center;z-index:10;box-shadow:0 20px 60px rgba(0,0,0,.45);pointer-events:auto}
  .logo{width:105px;height:105px;border-radius:50%;margin:0 auto 18px;background:radial-gradient(circle at 30% 24%,#fff 0%,#3ff5ff 15%,#24d6ff 32%,#424cff 58%,#832eea 100%);box-shadow:0 0 42px #18e8ff}
  h1{font-size:46px;margin:0 0 10px;font-weight:1000}.p{color:#dedcff;font-size:19px;line-height:1.35;margin:0 0 22px;font-weight:700}
  .btn{width:100%;border:0;border-radius:20px;padding:20px 18px;margin:8px 0;background:linear-gradient(90deg,#19e1f0,#833cff);color:white;font-size:26px;font-weight:1000;pointer-events:auto}.btn2{background:#2b2c42;font-size:22px}
  .hint{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));left:16px;right:16px;text-align:center;color:#d8d5ff;font-size:15px;font-weight:700;z-index:5}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="top" id="hud">
    <div class="box"><div class="label">Puntos</div><div class="num" id="score">0</div></div>
    <div class="box"><div class="label">Nivel</div><div class="num" id="level">1</div></div>
    <div class="box"><div class="label">Récord</div><div class="num" id="best">0</div></div>
    <button class="pause" id="pause">Ⅱ</button>
  </div>
  <div class="center" id="menu">
    <div class="logo"></div>
    <h1>Bola Loca</h1>
    <p class="p">Arrastra la bola, esquiva los obstáculos rojos y recoge monedas amarillas.</p>
    <button class="btn" id="play">Jugar</button>
    <button class="btn btn2" id="reset">Reiniciar progreso</button>
  </div>
  <div class="hint" id="hint">Toca Jugar. Luego mueve el dedo por la pantalla.</div>
</div>
<script>
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const menu=document.getElementById('menu'),scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),bestEl=document.getElementById('best'),hint=document.getElementById('hint');
let W=0,H=0,DPR=1,running=false,paused=false,last=0,score=0,level=1,best=Number(localStorage.getItem('bola_loca_best')||0),coins=0;
bestEl.textContent=best;
const ball={x:180,y:500,r:22,targetX:180,targetY:500};
let obstacles=[],bonuses=[];
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=Math.max(320,window.innerWidth);H=Math.max(520,window.innerHeight);canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);ball.x=clamp(ball.x,ball.r,W-ball.r);ball.y=clamp(ball.y,ball.r+90,H-ball.r-20);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
window.addEventListener('resize',resize,{passive:true});resize();
function resetGame(){score=0;level=1;coins=0;obstacles=[];bonuses=[];ball.x=W/2;ball.y=H-120;ball.targetX=ball.x;ball.targetY=ball.y;for(let i=0;i<6;i++)spawnObstacle(-i*120);for(let i=0;i<4;i++)spawnBonus(-60-i*180);running=true;paused=false;menu.style.display='none';hint.textContent='Arrastra la bola. Evita rojo, recoge amarillo.';updateHud();last=performance.now();}
function updateHud(){scoreEl.textContent=score;levelEl.textContent=level;bestEl.textContent=best;}
function spawnObstacle(offsetY){const w=50+Math.random()*70;obstacles.push({x:Math.random()*(W-w),y:offsetY||-80,w,h:24+Math.random()*22,s:2.2+level*.35+Math.random()*1.4});}
function spawnBonus(offsetY){bonuses.push({x:30+Math.random()*(W-60),y:offsetY||-140,r:14,s:2+level*.25,taken:false});}
function pointer(e){let x,y;if(e.touches&&e.touches[0]){x=e.touches[0].clientX;y=e.touches[0].clientY}else{x=e.clientX;y=e.clientY}ball.targetX=clamp(x,ball.r,W-ball.r);ball.targetY=clamp(y,ball.r+90,H-ball.r-20);}
['touchstart','touchmove'].forEach(ev=>canvas.addEventListener(ev,e=>{e.preventDefault();if(running&&!paused)pointer(e)},{passive:false}));
['mousedown','mousemove'].forEach(ev=>canvas.addEventListener(ev,e=>{if(running&&!paused)pointer(e)}));
document.getElementById('play').onclick=resetGame;
document.getElementById('reset').onclick=()=>{localStorage.removeItem('bola_loca_best');best=0;bestEl.textContent=0;};
document.getElementById('pause').onclick=()=>{if(!running)return;paused=!paused;hint.textContent=paused?'Pausado. Pulsa pausa para seguir.':'Arrastra la bola. Evita rojo, recoge amarillo.'};
function circleRect(c,r){return c.x+c.r>r.x&&c.x-c.r<r.x+r.w&&c.y+c.r>r.y&&c.y-c.r<r.y+r.h;}
function update(dt){if(!running||paused)return;ball.x+=(ball.targetX-ball.x)*Math.min(1,dt*9);ball.y+=(ball.targetY-ball.y)*Math.min(1,dt*9);for(const o of obstacles)o.y+=o.s*dt*60;for(const b of bonuses)b.y+=b.s*dt*60;for(const o of obstacles){if(circleRect(ball,o)){gameOver();return;}if(o.y>H+60){Object.assign(o,{x:Math.random()*(W-o.w),y:-80,w:50+Math.random()*75,h:24+Math.random()*24,s:2.2+level*.35+Math.random()*1.4});score++;if(score%10===0)level++;}}
for(const b of bonuses){const dx=ball.x-b.x,dy=ball.y-b.y;if(Math.hypot(dx,dy)<ball.r+b.r){score+=3;b.y=H+100;}if(b.y>H+60){Object.assign(b,{x:30+Math.random()*(W-60),y:-120,r:14,s:2+level*.25});}}
if(score>best){best=score;localStorage.setItem('bola_loca_best',best);}updateHud();}
function gameOver(){running=false;menu.style.display='block';menu.querySelector('h1').textContent='Game Over';menu.querySelector('.p').textContent='Puntuación: '+score+' · Récord: '+best;document.getElementById('play').textContent='Volver a jugar';hint.textContent='Has chocado con un obstáculo rojo.';}
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.04)';for(let y=120;y<H;y+=70){ctx.fillRect(0,y,W,1)}
for(const b of bonuses){ctx.beginPath();ctx.fillStyle='#ffd84d';ctx.shadowColor='#ffd84d';ctx.shadowBlur=18;ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff3a3';ctx.beginPath();ctx.arc(b.x-4,b.y-5,4,0,Math.PI*2);ctx.fill();}
for(const o of obstacles){ctx.fillStyle='#ff3b5f';ctx.shadowColor='#ff3b5f';ctx.shadowBlur=18;roundRect(o.x,o.y,o.w,o.h,12);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.35)';roundRect(o.x+8,o.y+5,o.w*.35,5,5);ctx.fill();}
ctx.beginPath();ctx.shadowColor='#23e7ff';ctx.shadowBlur=28;const g=ctx.createRadialGradient(ball.x-8,ball.y-10,3,ball.x,ball.y,ball.r);g.addColorStop(0,'#fff');g.addColorStop(.2,'#33f4ff');g.addColorStop(.65,'#3f55ff');g.addColorStop(1,'#8c2cff');ctx.fillStyle=g;ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function loop(t){const dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();requestAnimationFrame(loop);}requestAnimationFrame(loop);
</script>
</body>
</html>
