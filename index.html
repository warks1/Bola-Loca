<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#07091b" />
  <title>Crazy Ball v6.2 Ultra Graphics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud" class="hud hidden">
    <div class="pill">Puntos <b id="score">0</b></div>
    <div class="pill">Nivel <b id="level">1</b></div>
    <div class="pill">Prestigio <b id="prestige">0</b></div>
    <div class="pill">Monedas <b id="coins">0</b></div>
    <div class="pill">Multi <b id="multi">x1</b></div>
    <button id="pauseBtn" class="icon-btn">Ⅱ</button>
  </div>

  <main id="menu" class="screen">
    <section class="panel menu-panel">
      <div class="logo" id="logoBall"></div>
      <h1>CRAZY BALL</h1>
      <p class="subtitle">Esquiva, consigue ventajas, supera niveles y compite con otros jugadores.</p>
      <input id="playerName" class="input" maxlength="18" placeholder="Tu nombre" autocomplete="nickname" />
      <button id="playBtn" class="btn primary">JUGAR</button>
      <div class="grid2">
        <button id="skinsBtn" class="btn secondary">SKINS</button>
        <button id="rankingBtn" class="btn secondary">RANKING</button>
        <button id="missionsBtn" class="btn secondary">MISIONES</button>
        <button id="modesBtn" class="btn secondary">MODOS</button>
        <button id="powersBtn" class="btn secondary">VENTAJAS</button>
        <button id="howBtn" class="btn secondary">CÓMO JUGAR</button>
      </div>
      <button id="chatBtn" class="btn secondary">CHAT ONLINE</button>
      <div id="connectionStatus" class="status">Modo local activo</div>
      <div id="toast" class="toast">x2</div>
    </section>
  </main>

  <section id="modal" class="screen hidden">
    <div class="panel modal-panel">
      <button id="closeModal" class="close">×</button>
      <div id="modalContent"></div>
    </div>
  </section>

  <section id="gameOver" class="screen hidden">
    <div class="panel">
      <h2>FIN DE LA PARTIDA</h2>
      <p id="finalScore" class="bigline"></p>
      <p id="rankMessage"></p>
      <button id="retryBtn" class="btn primary">VOLVER A JUGAR</button>
      <button id="homeBtn" class="btn secondary">MENÚ</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
