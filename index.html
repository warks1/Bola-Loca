<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bola Loca - Meteoritos</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#07111f;font-family:Arial,sans-serif;touch-action:none}canvas{display:block;background:linear-gradient(180deg,#101c35,#030712)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;canvas.width=W;canvas.height=H;
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H;});

let state='menu';
let score=0,coins=0,best=Number(localStorage.getItem('bolaloca_best')||0);
let multiplier=1,multiplierTimer=0;
let speed=3.2;
let frame=0;
let player={x:W/2,y:H-110,r:24};
let obstacles=[],coinItems=[],meteorites=[],particles=[];

function rand(a,b){return Math.random()*(b-a)+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function reset(){
 state='play';score=0;coins=0;multiplier=1;multiplierTimer=0;speed=3.2;frame=0;
 player={x:W/2,y:H-110,r:24};obstacles=[];coinItems=[];meteorites=[];particles=[];
}
function addParticles(x,y,color,n=12){for(let i=0;i<n;i++)particles.push({x,y,vx:rand(-3,3),vy:rand(-3,3),life:35,color});}
function spawnObstacle(){obstacles.push({x:rand(35,W-35),y:-40,w:rand(50,95),h:rand(22,36),vy:speed+rand(0,1.6)});}
function spawnCoin(){coinItems.push({x:rand(30,W-30),y:-25,r:14,vy:speed+rand(.2,1.2)});}
function spawnMeteorite(){
 const values=[2,3,5,2,3,4,6,8,10];
 meteorites.push({x:rand(35,W-35),y:-40,r:22,vy:speed+rand(.4,1.5),value:pick(values),rot:rand(0,6.28)});
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function pointer(x){if(state==='menu'||state==='over'){reset();return}player.x=Math.max(player.r,Math.min(W-player.r,x));}
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointer(e.touches[0].clientX)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(state==='play')pointer(e.touches[0].clientX)},{passive:false});
canvas.addEventListener('mousedown',e=>pointer(e.clientX));
canvas.addEventListener('mousemove',e=>{if(state==='play')pointer(e.clientX)});

function update(){
 if(state!=='play')return;
 frame++;score+=0.05*multiplier;
 if(frame%42===0)spawnObstacle();
 if(frame%75===0)spawnCoin();
 if(frame%190===0)spawnMeteorite();
 if(frame%600===0)speed+=.35;
 if(multiplierTimer>0){multiplierTimer--; if(multiplierTimer<=0)multiplier=1;}
 obstacles.forEach(o=>o.y+=o.vy); coinItems.forEach(c=>c.y+=c.vy); meteorites.forEach(m=>{m.y+=m.vy;m.rot+=.08});
 particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
 obstacles=obstacles.filter(o=>o.y<H+80); coinItems=coinItems.filter(c=>c.y<H+50); meteorites=meteorites.filter(m=>m.y<H+60); particles=particles.filter(p=>p.life>0);
 for(const o of obstacles){
   let cx=Math.max(o.x-o.w/2,Math.min(player.x,o.x+o.w/2));
   let cy=Math.max(o.y-o.h/2,Math.min(player.y,o.y+o.h/2));
   if(Math.hypot(player.x-cx,player.y-cy)<player.r){state='over';best=Math.max(best,Math.floor(score));localStorage.setItem('bolaloca_best',best);addParticles(player.x,player.y,'#ef4444',30);}
 }
 coinItems=coinItems.filter(c=>{if(dist(player,c)<player.r+c.r){coins++;score+=10*multiplier;addParticles(c.x,c.y,'#facc15');return false}return true});
 meteorites=meteorites.filter(m=>{if(dist(player,m)<player.r+m.r){multiplier=m.value;multiplierTimer=360;addParticles(m.x,m.y,'#a855f7',22);return false}return true});
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function drawMeteorite(m){
 ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.rot);
 ctx.fillStyle='#7c2d12';ctx.beginPath();ctx.ellipse(0,0,m.r*1.15,m.r*.85,0,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#fb923c';ctx.beginPath();ctx.arc(-7,-4,5,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(7,5,4,0,Math.PI*2);ctx.fill();
 ctx.restore();
 ctx.fillStyle='white';ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.fillText('x'+m.value,m.x,m.y+5);
}
function draw(){
 ctx.clearRect(0,0,W,H);
 ctx.fillStyle='rgba(255,255,255,.06)';for(let i=0;i<40;i++){let x=(i*97+frame*.3)%W,y=(i*137+frame*.8)%H;ctx.fillRect(x,y,2,2)}
 if(state==='menu'){
   ctx.textAlign='center';ctx.fillStyle='#38bdf8';ctx.font='bold 46px Arial';ctx.fillText('BOLA LOCA',W/2,H/2-80);
   ctx.fillStyle='white';ctx.font='22px Arial';ctx.fillText('Pulsa JUGAR para probar',W/2,H/2-30);
   ctx.fillStyle='#22c55e';roundRect(W/2-90,H/2+10,180,58,18);ctx.fillStyle='#052e16';ctx.font='bold 26px Arial';ctx.fillText('JUGAR',W/2,H/2+48);return;
 }
 obstacles.forEach(o=>{ctx.fillStyle='#ef4444';roundRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h,10)});
 coinItems.forEach(c=>{ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#854d0e';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.fillText('$',c.x,c.y+5)});
 meteorites.forEach(drawMeteorite);
 ctx.fillStyle='#22d3ee';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=3;ctx.stroke();
 particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/35);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});
 ctx.fillStyle='rgba(0,0,0,.45)';roundRect(10,10,W-20,82,18);
 ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.textAlign='left';ctx.fillText('Puntos: '+Math.floor(score),24,38);ctx.fillText('Monedas: '+coins,24,66);
 ctx.textAlign='right';ctx.fillText('Récord: '+best,W-24,38);ctx.fillStyle=multiplier>1?'#c084fc':'white';ctx.fillText('Multiplicador: x'+multiplier,W-24,66);
 if(multiplier>1){ctx.fillStyle='#c084fc';ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.fillText('Meteorito activo: x'+multiplier, W/2, 112)}
 if(state==='over'){
   ctx.fillStyle='rgba(0,0,0,.68)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#ef4444';ctx.font='bold 42px Arial';ctx.fillText('GAME OVER',W/2,H/2-55);ctx.fillStyle='white';ctx.font='22px Arial';ctx.fillText('Puntos: '+Math.floor(score),W/2,H/2-10);ctx.fillText('Toca para reiniciar',W/2,H/2+40);
 }
}
function loop(){update();draw();requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
