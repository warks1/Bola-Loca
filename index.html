<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bola Loca</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050713;color:white;font-family:Arial,Helvetica,sans-serif;touch-action:none}#game{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:radial-gradient(circle at top,#263f85,#101832 45%,#050713)}.hidden{display:none!important}.screen{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:22px;background:linear-gradient(180deg,rgba(4,8,22,.25),rgba(4,8,22,.82))}.card{width:min(430px,94vw);padding:24px;border:1px solid rgba(255,255,255,.16);border-radius:28px;background:rgba(9,14,33,.9);box-shadow:0 22px 80px rgba(0,0,0,.5);text-align:center}h1{font-size:46px;margin:8px 0 10px;letter-spacing:2px}h2{font-size:34px;margin:6px 0 12px}p{color:#dbeafe}.logo{width:96px;height:96px;border-radius:50%;margin:0 auto 8px;background:radial-gradient(circle at 30% 25%,#fff 0 9%,#8df7ff 10% 22%,#00d5ff 48%,#7c3aed);box-shadow:0 0 45px #00d5ff;animation:pulse 1s infinite alternate}@keyframes pulse{to{transform:scale(1.07)}}button{width:100%;border:0;border-radius:18px;margin:8px 0;padding:16px 18px;font-size:19px;font-weight:900;color:white;background:#263556}.primary{background:linear-gradient(135deg,#08d7ff,#7c3aed);box-shadow:0 8px 25px rgba(9,214,255,.28)}button:active{transform:scale(.97)}small{display:block;color:#aab7d7;margin-top:10px}.hud{position:fixed;z-index:10;top:calc(8px + env(safe-area-inset-top,0px));left:8px;right:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;pointer-events:none}.hud div{border-radius:14px;padding:8px 2px;text-align:center;background:rgba(7,11,26,.72);border:1px solid rgba(255,255,255,.14)}.hud b{display:block;font-size:11px;color:#a9bbff}.hud span{font-size:19px;font-weight:900}.pause{position:fixed;right:12px;bottom:calc(14px + env(safe-area-inset-bottom,0px));z-index:12;width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.18);padding:0}.shopGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.skin{padding:12px;border-radius:18px;background:#18233f;border:1px solid rgba(255,255,255,.12)}.skin.ok{outline:3px solid #22d3ee}.skinBall{width:44px;height:44px;border-radius:50%;margin:0 auto 8px}.tip{position:fixed;z-index:9;left:12px;right:12px;bottom:calc(18px + env(safe-area-inset-bottom,0px));text-align:center;color:#dbeafe;font-weight:800;text-shadow:0 2px 8px #000;pointer-events:none}.bar{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);z-index:9;width:min(330px,80vw);height:8px;border-radius:99px;background:rgba(255,255,255,.18);pointer-events:none}.knob{position:absolute;left:50%;top:50%;width:34px;height:34px;margin:-17px 0 0 -17px;border-radius:50%;background:#22d3ee;box-shadow:0 0 22px #22d3ee}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="hud hidden"><div><b>PUNTOS</b><span id="score">0</span></div><div><b>MONEDAS</b><span id="coins">0</span></div><div><b>GEMAS</b><span id="gems">0</span></div><div><b>RÉCORD</b><span id="best">0</span></div></div>
<button id="pauseBtn" class="pause hidden">Ⅱ</button>
<div id="tip" class="tip hidden">Arrastra la bola con el dedo</div><div id="bar" class="bar hidden"><div class="knob"></div></div>
<section id="menu" class="screen"><div class="card"><div class="logo"></div><h1>BOLA LOCA</h1><p>Versión jugable: esquiva obstáculos rojos, recoge monedas y aguanta.</p><button id="play" class="primary">JUGAR</button><button id="shopBtn">TIENDA</button><button id="settingsBtn">AJUSTES</button><small>Funciona en iPhone, Android y ordenador.</small></div></section>
<section id="shop" class="screen hidden"><div class="card"><h2>Tienda</h2><div id="skins" class="shopGrid"></div><button id="backShop">VOLVER</button></div></section>
<section id="settings" class="screen hidden"><div class="card"><h2>Ajustes</h2><button id="soundBtn">Sonido: ON</button><button id="vibBtn">Vibración: ON</button><button id="backSettings">VOLVER</button></div></section>
<section id="pause" class="screen hidden"><div class="card"><h2>Pausa</h2><button id="resume" class="primary">SEGUIR</button><button id="exit">MENÚ</button></div></section>
<section id="over" class="screen hidden"><div class="card"><h2>GAME OVER</h2><p id="final">Puntos: 0</p><button id="retry" class="primary">REINTENTAR</button><button id="menuBtn">MENÚ</button></div></section>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);const canvas=$('game'),ctx=canvas.getContext('2d');
const el={hud:$('hud'),score:$('score'),coins:$('coins'),gems:$('gems'),best:$('best'),pauseBtn:$('pauseBtn'),tip:$('tip'),bar:$('bar'),menu:$('menu'),shop:$('shop'),settings:$('settings'),pause:$('pause'),over:$('over'),play:$('play'),shopBtn:$('shopBtn'),settingsBtn:$('settingsBtn'),backShop:$('backShop'),backSettings:$('backSettings'),soundBtn:$('soundBtn'),vibBtn:$('vibBtn'),resume:$('resume'),exit:$('exit'),retry:$('retry'),menuBtn:$('menuBtn'),final:$('final'),skins:$('skins')};
const saveKey='bola_loca_real_v2';let data;try{data=JSON.parse(localStorage.getItem(saveKey)||'{}')}catch(e){data={}}data={coins:data.coins||0,gems:data.gems||0,best:data.best||0,sound:data.sound!==false,vibration:data.vibration!==false,skin:data.skin||'neon',owned:data.owned||['neon']};function save(){localStorage.setItem(saveKey,JSON.stringify(data))}
const skins=[{id:'neon',name:'Neón',price:0,colors:['#fff','#67e8f9','#06b6d4','#7c3aed'],css:'radial-gradient(circle at 30% 25%,#fff,#67e8f9 25%,#06b6d4 58%,#7c3aed)'},{id:'gold',name:'Oro',price:25,colors:['#fff','#fde68a','#f59e0b','#78350f'],css:'radial-gradient(circle at 30% 25%,#fff,#fde68a 25%,#f59e0b 58%,#78350f)'},{id:'fire',name:'Fuego',price:60,colors:['#fff','#fdba74','#ef4444','#7f1d1d'],css:'radial-gradient(circle at 30% 25%,#fff,#fdba74 25%,#ef4444 58%,#7f1d1d)'},{id:'toxic',name:'Tóxica',price:90,colors:['#fff','#d9f99d','#22c55e','#14532d'],css:'radial-gradient(circle at 30% 25%,#fff,#d9f99d 25%,#22c55e 58%,#14532d)'}];
let W=0,H=0,D=1,state='menu',score=0,level=1,last=0,spawn=0,coinSpawn=0,powerSpawn=6,obstacles=[],coins=[],powers=[],parts=[],player={x:0,y:0,r:25,shield:0,magnet:0};
function resize(){D=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0);if(!player.x){player.x=W/2;player.y=H*.75}}addEventListener('resize',resize);resize();
function show(name){['menu','shop','settings','pause','over'].forEach(k=>el[k].classList.add('hidden'));if(name)el[name].classList.remove('hidden')}function hud(on){el.hud.classList.toggle('hidden',!on);el.pauseBtn.classList.toggle('hidden',!on);el.tip.classList.toggle('hidden',!on);el.bar.classList.toggle('hidden',!on)}function refresh(){el.score.textContent=Math.floor(score);el.coins.textContent=data.coins;el.gems.textContent=data.gems;el.best.textContent=data.best;el.soundBtn.textContent='Sonido: '+(data.sound?'ON':'OFF');el.vibBtn.textContent='Vibración: '+(data.vibration?'ON':'OFF')}
function renderShop(){el.skins.innerHTML='';skins.forEach(s=>{const owned=data.owned.includes(s.id);const d=document.createElement('div');d.className='skin '+(data.skin===s.id?'ok':'');d.innerHTML='<div class="skinBall" style="background:'+s.css+'"></div><b>'+s.name+'</b><br><small>'+(owned?'Disponible':s.price+' monedas')+'</small>';d.onclick=()=>{if(owned){data.skin=s.id}else if(data.coins>=s.price){data.coins-=s.price;data.owned.push(s.id);data.skin=s.id}save();renderShop();refresh()};el.skins.appendChild(d)})}
function menu(){state='menu';hud(false);show('menu');refresh()}function start(){state='playing';score=0;level=1;spawn=.2;coinSpawn=.2;powerSpawn=4;obstacles=[];coins=[];powers=[];parts=[];player={x:W/2,y:H*.72,r:26,shield:0,magnet:0};show(null);hud(true);refresh()}function pause(){if(state==='playing'){state='pause';show('pause');hud(false)}}function resume(){state='playing';show(null);hud(true)}function gameover(){state='over';data.best=Math.max(data.best,Math.floor(score));save();el.final.textContent='Puntos: '+Math.floor(score);hud(false);show('over');refresh();if(data.vibration&&navigator.vibrate)navigator.vibrate(120)}
function move(clientX,clientY){if(state!=='playing')return;player.x=Math.max(player.r,Math.min(W-player.r,clientX));player.y=Math.max(110,Math.min(H-55,clientY));const pct=(player.x-player.r)/(W-player.r*2)*100;el.bar.firstElementChild.style.left=pct+'%'}
canvas.addEventListener('touchstart',e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});canvas.addEventListener('mousedown',e=>move(e.clientX,e.clientY));canvas.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
el.play.onclick=start;el.retry.onclick=start;el.menuBtn.onclick=menu;el.exit.onclick=menu;el.pauseBtn.onclick=pause;el.resume.onclick=resume;el.shopBtn.onclick=()=>{renderShop();show('shop')};el.settingsBtn.onclick=()=>show('settings');el.backShop.onclick=menu;el.backSettings.onclick=menu;el.soundBtn.onclick=()=>{data.sound=!data.sound;save();refresh()};el.vibBtn.onclick=()=>{data.vibration=!data.vibration;save();refresh()};
function hit(x,y,r){return Math.hypot(player.x-x,player.y-y)<r}function burst(x,y,c,n){for(let i=0;i<n;i++)parts.push({x,y,c,life:.45+Math.random()*.3,vx:(Math.random()-.5)*260,vy:(Math.random()-.5)*260})}function addObstacle(){const r=18+Math.random()*24;obstacles.push({x:r+Math.random()*(W-r*2),y:-r,r,fast:Math.random()<.28})}function addCoin(){coins.push({x:26+Math.random()*(W-52),y:-28,r:14,a:0})}function addPower(){powers.push({x:34+Math.random()*(W-68),y:-38,r:18,type:Math.random()<.5?'S':'M'})}
function update(dt){score+=dt*10;level=1+score/120;spawn-=dt;coinSpawn-=dt;powerSpawn-=dt;player.shield=Math.max(0,player.shield-dt);player.magnet=Math.max(0,player.magnet-dt);if(spawn<=0){spawn=Math.max(.35,1.05-level*.06);addObstacle()}if(coinSpawn<=0){coinSpawn=.65;addCoin()}if(powerSpawn<=0){powerSpawn=7+Math.random()*5;addPower()}const sp=145+level*34;obstacles.forEach(o=>o.y+=sp*dt*(o.fast?1.5:1));coins.forEach(c=>{c.y+=sp*.78*dt;c.a+=dt*5;if(player.magnet>0){const dx=player.x-c.x,dy=player.y-c.y,d=Math.hypot(dx,dy)||1;if(d<185){c.x+=dx/d*280*dt;c.y+=dy/d*280*dt}}});powers.forEach(p=>p.y+=sp*.72*dt);obstacles=obstacles.filter(o=>o.y<H+90);coins=coins.filter(c=>c.y<H+50&&!c.dead);powers=powers.filter(p=>p.y<H+50&&!p.dead);obstacles.forEach(o=>{if(hit(o.x,o.y,o.r+player.r-5)){if(player.shield>0){o.y=H+100;player.shield=0;burst(o.x,o.y,'#60a5fa',18)}else gameover()}});coins.forEach(c=>{if(hit(c.x,c.y,c.r+player.r)){c.dead=true;data.coins++;score+=5;save();burst(c.x,c.y,'#facc15',10);refresh()}});powers.forEach(p=>{if(hit(p.x,p.y,p.r+player.r)){p.dead=true;if(p.type==='S')player.shield=8;else player.magnet=8;burst(p.x,p.y,'#a78bfa',18)}});parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt});parts=parts.filter(p=>p.life>0)}
function bg(){ctx.clearRect(0,0,W,H);ctx.save();ctx.globalAlpha=.22;ctx.strokeStyle='#60a5fa';ctx.lineWidth=1;const off=(score*1.5)%42;for(let y=-42+off;y<H;y+=42){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}for(let x=0;x<W;x+=42){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}ctx.restore()}function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.scale(Math.abs(Math.cos(c.a))*.55+.45,1);ctx.fillStyle='#facc15';ctx.shadowColor='#facc15';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff7ad';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',0,1);ctx.restore();ctx.shadowBlur=0}function drawObstacle(o){ctx.save();ctx.translate(o.x,o.y);ctx.rotate(last/500+o.x*.01);ctx.fillStyle=o.fast?'#fb7185':'#ef4444';ctx.shadowColor='#ef4444';ctx.shadowBlur=20;ctx.beginPath();for(let i=0;i<10;i++){const a=i*Math.PI/5,r=i%2?o.r*.55:o.r;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.restore();ctx.shadowBlur=0}function drawPower(p){ctx.fillStyle=p.type==='S'?'#60a5fa':'#a78bfa';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='white';ctx.font='bold 19px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.type,p.x,p.y+1)}function drawPlayer(){const sk=skins.find(s=>s.id===data.skin)||skins[0],g=ctx.createRadialGradient(player.x-player.r*.35,player.y-player.r*.35,2,player.x,player.y,player.r*1.2);sk.colors.forEach((c,i)=>g.addColorStop([0,.25,.68,1][i],c));ctx.shadowColor='#22d3ee';ctx.shadowBlur=28;ctx.fillStyle=g;ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;if(player.shield>0){ctx.strokeStyle='#93c5fd';ctx.lineWidth=4;ctx.beginPath();ctx.arc(player.x,player.y,player.r+10,0,Math.PI*2);ctx.stroke()}if(player.magnet>0){ctx.strokeStyle='rgba(216,180,254,.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(player.x,player.y,76+Math.sin(last/120)*5,0,Math.PI*2);ctx.stroke()}}
function draw(){bg();coins.forEach(drawCoin);powers.forEach(drawPower);obstacles.forEach(drawObstacle);parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});if(state!=='menu'&&state!=='shop'&&state!=='settings')drawPlayer();if(state==='playing')refresh()}
function loop(t){const dt=Math.min((t-last)/1000||0,0.033);last=t;if(state==='playing')update(dt);draw();requestAnimationFrame(loop)}refresh();menu();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
