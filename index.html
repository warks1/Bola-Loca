<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#070b1a">
  <title>Bola Loca</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="hud" class="hud hidden">
      <div><b>Puntos</b><span id="score">0</span></div>
      <div><b>Monedas</b><span id="coins">0</span></div>
      <div><b>Gemas</b><span id="gems">0</span></div>
      <div><b>Récord</b><span id="best">0</span></div>
    </div>

    <section id="screenMenu" class="screen">
      <div class="card hero">
        <div class="logoBall"></div>
        <h1>BOLA LOCA</h1>
        <p>Esquiva obstáculos, recoge monedas y aguanta todo lo posible.</p>
        <button id="btnPlay" class="primary">JUGAR</button>
        <button id="btnShop">TIENDA</button>
        <button id="btnSettings">AJUSTES</button>
        <small>Arrastra la bola con el dedo.</small>
      </div>
    </section>

    <section id="screenShop" class="screen hidden">
      <div class="card">
        <h2>Tienda de skins</h2>
        <div id="skinList" class="skinList"></div>
        <button class="back">VOLVER</button>
      </div>
    </section>

    <section id="screenSettings" class="screen hidden">
      <div class="card">
        <h2>Ajustes</h2>
        <button id="btnSound">Sonido: ON</button>
        <button id="btnVibration">Vibración: ON</button>
        <button class="back">VOLVER</button>
      </div>
    </section>

    <section id="screenPause" class="screen hidden">
      <div class="card">
        <h2>Pausa</h2>
        <button id="btnResume" class="primary">SEGUIR</button>
        <button id="btnExit">MENÚ</button>
      </div>
    </section>

    <section id="screenGameOver" class="screen hidden">
      <div class="card">
        <h2>GAME OVER</h2>
        <p id="finalScore">Puntos: 0</p>
        <button id="btnRetry" class="primary">REINTENTAR</button>
        <button id="btnMenu">MENÚ</button>
      </div>
    </section>

    <button id="pauseBtn" class="pause hidden">Ⅱ</button>
  </div>
  <script src="js/save.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
